# TEMPORARY Windows reproduction harness for the #394 group.
# Builds the current-main Windows binary and indexes a small repo at a
# C:\ drive-letter path with subdirectories, a .cbmignore, and .mjs/.js
# files, then dumps diagnostics to check:
#   #347 no crash on index    #227/#367 DB persists on a drive-letter path
#   #331 indexes the given path (not C:\Users)   #266 directory structure
#   #274 .cbmignore respected  #348 search_code on Windows
# DELETE this workflow after the run.
name: Repro Windows (temp)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-repro:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2
        with:
          msystem: CLANG64
          path-type: inherit
          install: >-
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-zlib
            make
            zip
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Build binary
        shell: msys2 {0}
        run: scripts/build.sh CC=clang CXX=clang++

      - name: Build test repo at a C:\ drive-letter path
        shell: msys2 {0}
        run: |
          mkdir -p /c/cbmrepo/src/sub /c/cbmrepo/ignoreme
          printf 'export function alphaHandler() { return 1; }\n' > /c/cbmrepo/src/server.mjs
          printf 'function betaCompute() { return 2; }\nmodule.exports = { betaCompute };\n' > /c/cbmrepo/src/sub/calc.js
          printf 'function secretIgnored() { return 3; }\n' > /c/cbmrepo/ignoreme/skip.js
          printf 'ignoreme/\n' > /c/cbmrepo/.cbmignore
          ls -R /c/cbmrepo

      - name: Index + diagnostics (no hard gate — dump for analysis)
        shell: msys2 {0}
        env:
          CBM_CACHE_DIR: 'C:/cbmcache'
        run: |
          BIN=build/c/codebase-memory-mcp.exe
          echo "===== #347/#227/#367 INDEX (drive-letter path) ====="
          "$BIN" cli index_repository '{"repo_path":"C:/cbmrepo","mode":"full"}'; echo "INDEX_EXIT=$?"
          echo "===== DB persisted? (#227/#367 — cache dir should contain a non-empty .db) ====="
          ls -la /c/cbmcache || echo "NO CACHE DIR"
          echo "===== #331/#266 list_projects (root_path must be C:/cbmrepo, not C:/Users) ====="
          "$BIN" cli list_projects '{}'
          echo "===== #266 directory structure (expect src/ and src/sub/ files) ====="
          "$BIN" cli query_graph '{"project":"C-cbmrepo","query":"MATCH (f:File) RETURN f.file_path"}' || true
          echo "===== #348 search_code .mjs (alphaHandler) and .js (betaCompute) ====="
          "$BIN" cli search_code '{"project":"C-cbmrepo","pattern":"alphaHandler"}' || true
          "$BIN" cli search_code '{"project":"C-cbmrepo","pattern":"betaCompute"}' || true
          echo "===== #274 .cbmignore (secretIgnored must NOT be indexed → 0 results) ====="
          "$BIN" cli search_graph '{"project":"C-cbmrepo","name_pattern":"secretIgnored"}' || true
          echo "===== done ====="
